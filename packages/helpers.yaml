###############################################################################
# POOL CONTROLLER HA
# helpers.yaml
# Version 0.1.0
#
# Paramètres réglables depuis Home Assistant
###############################################################################

input_boolean:

  pool_controller_active:
    name: Pool Controller actif
    icon: mdi:robot

  pool_controller_simulation:
    name: Mode simulation
    icon: mdi:test-tube

  pool_controller_protection_serpentin:
    name: Protection serpentin
    icon: mdi:white-balance-sunny


input_select:

  pool_controller_mode:
    name: Mode filtration

    options:
      - Automatique
      - Filtration continue
      - Traitement
      - Marche forcée
      - Arrêt forcé
      - Maintenance

    initial: Automatique
    icon: mdi:pool


  pool_controller_priorite:

    name: Priorité optimisation

    options:
      - Chauffage
      - Équilibré
      - Filtration

    initial: Équilibré
    icon: mdi:tune



input_number:


  pool_controller_temperature_cible:

    name: Température cible

    min: 20
    max: 35
    step: 0.5

    unit_of_measurement: °C

    initial: 29



  pool_controller_luminosite_on:

    name: Luminosité démarrage chauffage

    min: 1000
    max: 50000
    step: 500

    unit_of_measurement: lx

    initial: 27000



  pool_controller_luminosite_off:

    name: Luminosité arrêt chauffage

    min: 1000
    max: 50000
    step: 500

    unit_of_measurement: lx

    initial: 22000



  pool_controller_delta_temperature_on:

    name: Écart température ON

    min: 0
    max: 10
    step: 0.5

    unit_of_measurement: °C

    initial: 2



  pool_controller_delta_temperature_off:

    name: Écart température OFF

    min: 0
    max: 10
    step: 0.5

    unit_of_measurement: °C

    initial: 1



  pool_controller_debit_minimum:

    name: Débit minimum filtration

    min: 1000
    max: 6000
    step: 100

    unit_of_measurement: L/h

    initial: 3000



  pool_controller_marche_minimum:

    name: Durée minimum marche

    min: 5
    max: 180
    step: 5

    unit_of_measurement: min

    initial: 30



  pool_controller_arret_minimum:

    name: Durée minimum arrêt

    min: 5
    max: 180
    step: 5

    unit_of_measurement: min

    initial: 15