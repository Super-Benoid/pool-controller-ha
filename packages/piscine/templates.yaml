###############################################################################
# Pool Controller HA
# templates.yaml
#
# Calculs métier
###############################################################################

template:

###############################################################################
# Temps minimum de filtration
###############################################################################

  - sensor:

      - name: Pool Controller Temps filtration minimum

        unique_id: pool_controller_temps_filtration_minimum

        unit_of_measurement: "h"

        icon: mdi:clock-outline

        state: >

          {% set t = states('sensor.pool_controller_temperature_eau') | float(0) %}

          {% if t < 20 %}
            4

          {% elif t < 24 %}
            6

          {% elif t < 27 %}
            8

          {% else %}
            {{ (10 + ((t - 27) * 2)) | round(1) }}

          {% endif %}

###############################################################################
# Objectif de filtration (minutes)
###############################################################################

      - name: Pool Controller Objectif filtration minutes

        unique_id: pool_controller_objectif_filtration_minutes

        unit_of_measurement: "min"

        icon: mdi:timer

        state: >

          {% set t = states('sensor.pool_controller_temperature_eau')|float(0) %}

          {% if t < 20 %}
            240

          {% elif t < 24 %}
            360

          {% elif t < 27 %}
            480

          {% else %}
            {{ (600 + ((t - 27) * 120)) | round(0) }}

          {% endif %}

###############################################################################
# Temps filtré aujourd'hui (minutes)
###############################################################################

      - name: Pool Controller Temps filtré minutes

        unique_id: pool_controller_temps_filtre_minutes

        unit_of_measurement: "min"

        icon: mdi:timer-check

        state: >

          {{
            (
              states('sensor.pool_controller_temps_filtration_aujourd_hui')
              |float(0)
              *60
            )|round(0)
          }}

###############################################################################
# Temps restant
###############################################################################

      - name: Pool Controller Temps restant minutes

        unique_id: pool_controller_temps_restant_minutes

        unit_of_measurement: "min"

        icon: mdi:timer-sand

        state: >

          {% set objectif =
             states('sensor.pool_controller_objectif_filtration_minutes')|int(0)
          %}

          {% set realise =
             states('sensor.pool_controller_temps_filtre_minutes')|int(0)
          %}

          {{ [objectif-realise,0]|max }}

###############################################################################
# État du contrôleur
###############################################################################

      - name: Pool Controller État

        unique_id: pool_controller_etat

        icon: mdi:state-machine

        state: >

          {% set mode = states('input_select.pool_controller_mode') %}

          {% if mode == "Arrêt forcé" %}
            Arrêt forcé

          {% elif mode == "Marche forcée" %}
            Marche forcée

          {% elif mode == "Filtration continue" %}
            Filtration continue

          {% elif is_state('binary_sensor.pool_controller_debit_valide','off') %}
            Protection

          {% else %}
            Automatique

          {% endif %}