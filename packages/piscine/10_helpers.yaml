###############################################################################
# POOL CONTROLLER
# Version : 0.1.0
#
# Helpers de configuration
###############################################################################

###############################################################################
# INPUT BOOLEAN
###############################################################################

input_boolean:

  pool_controller_enabled:
    name: Pool Controller - Activé
    icon: mdi:robot

  pool_controller_simulation:
    name: Pool Controller - Simulation
    icon: mdi:test-tube

  pool_controller_serpentin_protection:
    name: Protection serpentin
    icon: mdi:white-balance-sunny

###############################################################################
# INPUT SELECT
###############################################################################

input_select:

  pool_controller_mode:

    name: Mode de fonctionnement

    options:
      - Automatique
      - Filtration continue
      - Traitement
      - Marche forcée
      - Arrêt forcé
      - Maintenance

    initial: Automatique

    icon: mdi:pool

  pool_controller_optimisation:

    name: Priorité

    options:
      - Chauffage
      - Équilibré
      - Filtration

    initial: Équilibré

    icon: mdi:tune

###############################################################################
# INPUT NUMBER
###############################################################################

input_number:

  pool_controller_temperature_cible:
    name: Température cible
    min: 20
    max: 35
    step: 0.5
    unit_of_measurement: "°C"
    initial: 29
    mode: box

  pool_controller_temperature_max:
    name: Température maximale
    min: 20
    max: 40
    step: 0.5
    unit_of_measurement: "°C"
    initial: 30
    mode: box

  pool_controller_lux_on:
    name: Luminosité démarrage
    min: 1000
    max: 50000
    step: 500
    unit_of_measurement: lx
    initial: 27000
    mode: box

  pool_controller_lux_off:
    name: Luminosité arrêt
    min: 1000
    max: 50000
    step: 500
    unit_of_measurement: lx
    initial: 22000
    mode: box

  pool_controller_delta_temp_on:
    name: Delta température ON
    min: 0
    max: 10
    step: 0.5
    unit_of_measurement: "°C"
    initial: 2
    mode: box

  pool_controller_delta_temp_off:
    name: Delta température OFF
    min: 0
    max: 10
    step: 0.5
    unit_of_measurement: "°C"
    initial: 1
    mode: box

  pool_controller_debit_min:
    name: Débit minimum
    min: 1000
    max: 6000
    step: 100
    unit_of_measurement: "L/h"
    initial: 3000
    mode: box

  pool_controller_puissance_min:
    name: Puissance minimum
    min: 50
    max: 1000
    step: 10
    unit_of_measurement: W
    initial: 250
    mode: box

  pool_controller_puissance_max:
    name: Puissance maximum
    min: 100
    max: 1000
    step: 10
    unit_of_measurement: W
    initial: 400
    mode: box

  pool_controller_marche_min:
    name: Temps minimum de marche
    min: 5
    max: 180
    step: 5
    unit_of_measurement: min
    initial: 30
    mode: box

  pool_controller_arret_min:
    name: Temps minimum d'arrêt
    min: 5
    max: 180
    step: 5
    unit_of_measurement: min
    initial: 15
    mode: box

  pool_controller_validation_temperature:
    name: Validation température
    min: 1
    max: 10
    step: 1
    unit_of_measurement: min
    initial: 3
    mode: box

  pool_controller_serpentin_on:
    name: Protection serpentin ON
    min: 1
    max: 15
    step: 1
    unit_of_measurement: min
    initial: 5
    mode: box

  pool_controller_serpentin_off:
    name: Protection serpentin OFF
    min: 5
    max: 60
    step: 5
    unit_of_measurement: min
    initial: 25
    mode: box

  pool_controller_traitement_duree:
    name: Durée du traitement
    min: 1
    max: 48
    step: 1
    unit_of_measurement: h
    initial: 12
    mode: box

###############################################################################
# INPUT DATETIME
###############################################################################

input_datetime:

  pool_controller_heure_debut_solaire:
    name: Début chauffage solaire
    has_date: false
    has_time: true

  pool_controller_fin_traitement:
    name: Fin traitement
    has_date: true
    has_time: true