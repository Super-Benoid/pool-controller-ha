###############################################################################
# Pool Controller Home Assistant (PCHA)
#
# Fichier....... : filtration.yaml
# Domaine....... : Helpers
# SPEC.......... : SPEC-004
# Version....... : V1.0.0
#
# Description :
#   Paramètres de configuration de la filtration.
#
# Entrées :
#   Aucune
#
# Sorties :
#   input_number.pcha_consigne_temperature
#   input_number.pcha_tempo_filtration_minimale
###############################################################################

input_number:

###############################################################################
# CONSIGNES
###############################################################################

  pcha_consigne_temperature:
    name: Consigne température
    icon: mdi:thermometer-water
    min: 10
    max: 35
    step: 0.5
    unit_of_measurement: "°C"
    mode: box

###############################################################################
# TEMPORISATIONS
###############################################################################

  pcha_tempo_filtration_minimale:
    name: Filtration minimale
    icon: mdi:timer-outline
    min: 0
    max: 120
    step: 5
    unit_of_measurement: "min"
    mode: box