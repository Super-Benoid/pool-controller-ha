###############################################################################
# Pool Controller HA
# scripts.yaml
#
# Scripts V1
###############################################################################

pool_controller_pompe_on:
  alias: Pool Controller - Démarrer la pompe
  description: Démarre la pompe de filtration
  mode: single

  sequence:

    - if:
        - condition: state
          entity_id: switch.jardin_prises_exterieur_pompe_de_filtration
          state: "off"

      then:

        - service: switch.turn_on
          target:
            entity_id: switch.jardin_prises_exterieur_pompe_de_filtration


pool_controller_pompe_off:
  alias: Pool Controller - Arrêter la pompe
  description: Arrête la pompe de filtration
  mode: single

  sequence:

    - if:
        - condition: state
          entity_id: switch.jardin_prises_exterieur_pompe_de_filtration
          state: "on"

      then:

        - service: switch.turn_off
          target:
            entity_id: switch.jardin_prises_exterieur_pompe_de_filtration


pool_controller_notification:
  alias: Pool Controller - Notification interne
  description: Journal du contrôleur
  mode: queued

  fields:

    message:
      description: Texte

  sequence:

    - service: logbook.log
      data:

        name: Pool Controller

        message: "{{ message }}"


pool_controller_reevaluation:
  alias: Pool Controller - Réévaluation
  description: Force une réévaluation des automatisations
  mode: restart

  sequence:

    - event: pool_controller_update